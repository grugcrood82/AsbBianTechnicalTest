services:
  functions:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    container_name: asb-bian-functions
    ports:
      - "7071:80"
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      AzureWebJobsScriptRoot: /home/site/wwwroot
      AzureFunctionsJobHost__Logging__Console__IsEnabled: 'true'
      AzureWebJobsStorage: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;
    depends_on:
      neo4j:
        condition: service_started
      azurite:
        condition: service_started
    networks:
      - asb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/swagger/ui"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: asb-bian-azurite
    ports:
      - "10000:10000"  # Blob Storage
      - "10001:10001"  # Queue Storage
      - "10002:10002"  # Table Storage
    networks:
      - asb-network
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    container_name: asb-bian-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
    ports:
      - "7687:7687"  # Bolt protocol
      - "7474:7474"  # HTTP
    volumes:
      - neo4j_data:/data
    networks:
      - asb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7474/"] 
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  seed-data:
    image: curlimages/curl:latest
    container_name: asb-bian-seed-data
    depends_on:
      functions:
        condition: service_healthy
    networks:
      - asb-network
    command: |
      sh -c 'sleep 5 && 
             echo "Seeding demo data..." &&
             curl -X POST http://functions:80/api/entitlement/seed -H "Content-Type: application/json" &&
             echo "" &&
             echo "Seed operation completed"'
    restart: "no"

volumes:
  neo4j_data:

networks:
  asb-network:
    driver: bridge
